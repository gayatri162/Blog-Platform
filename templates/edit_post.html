<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Blog</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/dashboard">BlogPlatform</a>

<div>
<a class="btn btn-light btn-sm" href="/dashboard">Home</a>
<a class="btn btn-danger btn-sm" href="/logout">Logout</a>
</div>

</div>
</nav>

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Edit Blog</h2>

<!-- IMPORTANT: multipart form for image upload -->
<form action="/edit/{{ post._id }}" method="POST" enctype="multipart/form-data">

<!-- TITLE -->
<div class="mb-3">

<label>Title</label>

<input
type="text"
class="form-control"
name="title"
value="{{ post.title }}"
required>

</div>

<!-- CURRENT IMAGE PREVIEW -->
<div class="mb-3">

<label>Current Image</label><br>

<img src="{{ post.image }}" width="200" class="mb-2">

</div>

<!-- NEW IMAGE UPLOAD (OPTIONAL) -->
<div class="mb-3">

<label>Change Image (optional)</label>

<input
type="file"
class="form-control"
name="image"
accept="image/*">

</div>

<!-- DESCRIPTION -->
<div class="mb-3">

<label>Description</label>

<textarea
class="form-control"
rows="6"
name="description"
required>{{ post.description }}</textarea>

</div>

<!-- BUTTONS -->
<button class="btn btn-success">
Update Blog
</button>

<a href="/dashboard" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
