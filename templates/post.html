<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ post.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/dashboard">BlogPlatform</a>

<div>
    
<a class="btn btn-light btn-sm" href="/profile">Profile</a>
<a class="btn btn-light btn-sm" href="/dashboard">Home</a>
<a class="btn btn-light btn-sm" href="/dashboard">Blogs</a>
<a class="btn btn-danger btn-sm" href="/logout">Logout</a>

</div>

</div>

</nav>

<div class="container mt-5">

    <a href="/dashboard" class="btn btn-secondary mb-4">
        ← Back to Dashboard
    </a>

    <!-- Blog Card -->

    <div class="card shadow">

        <img src="{{ post.image }}"
             class="card-img-top"
             style="height:450px; object-fit:cover;">

        <div class="card-body">

             <h2>{{ post.title }}</h2>

             <p class="text-muted">
               By {{ post.author }}
             </p>
             
             <p class="text-secondary">
               {{ post.created_at }}
             </p>
            <hr>

            <p style="font-size:18px;">
                {{ post.description }}
            </p>
           
            <div class="mt-3">

<a href="/like/{{ post._id }}" class="btn btn-outline-danger btn-sm">
❤️ {{ post.likes or 0 }}
</a>

<a href="/save/{{ post._id }}" class="btn btn-outline-primary btn-sm">
🔖 Save
</a>

</div>
        </div>

    </div>

    <!-- Comment Section -->

    <div class="mt-5">

        <h3>Comments</h3>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">Your Name</label>

                <input
                    type="text"
                    class="form-control"
                    name="username"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">Comment</label>

                <textarea
                    class="form-control"
                    rows="4"
                    name="message"
                    required></textarea>

            </div>

            <button type="submit" class="btn btn-success">
                Post Comment
            </button>

        </form>

        <hr class="my-4">

        {% for comment in comments %}

        <div class="card mb-3">

            <div class="card-body">

                <h5>{{ comment.username }}</h5>

                <p>{{ comment.message }}</p>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
