<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2>{{ username }}</h2>

<p><strong>Email:</strong> {{ email }}</p>

<p><strong>Total Blogs:</strong> {{ total_posts }}</p>

<a href="/dashboard" class="btn btn-primary mb-4">
← Dashboard
</a>

<h4>My Blogs</h4>

<hr>

{% if posts %}

{% for post in posts %}

<div class="card mb-3">

<img src="{{ post.image }}" class="card-img-top" style="height:220px; object-fit:cover;">

<div class="card-body">

<h5>{{ post.title }}</h5>

<p>{{ post.description[:120] }}...</p>

<a href="/post/{{ post._id }}" class="btn btn-primary btn-sm">
Read
</a>

<a href="/edit/{{ post._id }}" class="btn btn-warning btn-sm">
Edit
</a>

</div>

</div>

{% endfor %}

{% else %}

<p class="text-muted">
You haven't published any blogs yet.
</p>

{% endif %}

</div>

</div>

</body>

</html>
